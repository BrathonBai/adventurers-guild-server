name: Deploy Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install root dependencies
      run: npm ci
    
    - name: Build frontend
      run: npm run build
    
    - name: Install server dependencies
      run: cd server && npm ci
    
    - name: Build server
      run: cd server && npm run build
    
    - name: Start server (background)
      run: |
        cd server
        nohup npm start > ../server.log 2>&1 &
        echo $! > ../server.pid
        sleep 5
    
    - name: Check server status
      run: |
        if ps -p $(cat server.pid) > /dev/null; then
          echo "✅ Server is running"
          echo "Server PID: $(cat server.pid)"
          curl -f http://localhost:5173 || echo "UI not responding yet"
          curl -f http://localhost:3000 || echo "WebSocket not responding yet"
        else
          echo "❌ Server failed to start"
          cat server.log
          exit 1
        fi
    
    - name: Show server logs
      run: |
        echo "=== Server Logs ==="
        cat server.log
    
    - name: Keep server alive (5 minutes for testing)
      run: |
        echo "Server is running in background"
        echo "PID: $(cat server.pid)"
        echo "Keeping alive for 5 minutes..."
        sleep 300
